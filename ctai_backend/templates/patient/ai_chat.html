{% extends "base.html" %}

{% block title %}AI咨询 - SAM-Med3D{% endblock %}

{% block body %}
<div class="min-h-screen" style="background-color: var(--bg-main);">
    <div class="page-header">
        <div class="container">
            <div class="flex items-center justify-between">
                <div class="min-w-0" style="flex: 1;">
                    <h1 class="text-responsive-lg" style="font-weight: 600; color: var(--text-primary); line-height: 1.3;">AI智能咨询</h1>
                    <p class="text-responsive-sm" style="color: var(--text-secondary); margin-top: 4px;">SAM-Med3D AI 助手</p>
                </div>
                <button onclick="window.location.href='{{ url_for('patient.dashboard') }}'" class="btn btn-secondary" style="flex-shrink: 0; padding: 8px 12px;">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    <span class="hidden md:inline">返回</span>
                </button>
            </div>
        </div>
    </div>

    <div class="page-content">
        <div class="container">
            <div class="card" style="max-width: 800px; margin: 0 auto;">
                <div style="background-color: var(--primary); border-radius: 12px; padding: clamp(12px, 3vw, 20px); margin-bottom: clamp(16px, 4vw, 24px);">
                    <div class="flex items-start" style="gap: clamp(8px, 2vw, 12px);">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0" style="background-color: var(--primary-text);">
                            <i data-lucide="bot" class="w-5 h-5" style="color: white;"></i>
                        </div>
                        <div class="min-w-0" style="flex: 1;">
                            <p class="text-responsive-base" style="font-weight: 600; color: var(--text-primary); margin-bottom: 8px;">您好，我是 SAM-Med3D AI 助手</p>
                            <p class="text-responsive-sm" style="color: var(--text-secondary); line-height: 1.6;">
                                我可以帮您解答关于CT检查报告的常见问题。请注意，我的回答仅供参考，如有疑问请咨询您的主治医生。
                            </p>
                        </div>
                    </div>
                </div>

                <div id="chat-messages" style="height: clamp(250px, 50vw, 400px); overflow-y: auto; padding: clamp(12px, 3vw, 20px); background-color: var(--bg-main); border-radius: 12px; margin-bottom: clamp(12px, 3vw, 20px);">
                    <div class="flex justify-start" style="margin-bottom: 16px;">
                        <div style="max-width: 85%; padding: 12px 16px; background-color: var(--bg-surface); border-radius: 12px; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                            <p class="text-responsive-base" style="color: var(--text-primary); line-height: 1.5;">请问有什么可以帮助您的？您可以问我：</p>
                            <ul class="text-responsive-sm" style="color: var(--text-secondary); margin-top: 8px; padding-left: 16px; line-height: 1.6;">
                                <li>CT检查前需要做什么准备？</li>
                                <li>报告中提到的结节是什么意思？</li>
                                <li>如何解读CT报告？</li>
                                <li>复查应该注意什么？</li>
                            </ul>
                        </div>
                    </div>
                </div>

                <form id="chat-form" class="flex flex-col sm:flex-row" style="gap: clamp(8px, 2vw, 12px);">
                    <input type="text" id="chat-input" placeholder="输入您的问题..." class="input" style="flex: 1; min-height: 44px;">
                    <button type="submit" class="btn btn-primary flex-shrink-0" style="min-height: 44px; padding: 0 20px;">
                        <i data-lucide="send" class="w-4 h-4"></i>
                        <span class="hidden sm:inline">发送</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chat-messages');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');

    const predefinedResponses = {
        'ct': 'CT检查是一种计算机断层扫描技术，可以获得人体内部结构的详细图像。在进行检查前，通常需要去除检查部位的金属物品。',
        '结节': '结节是影像检查中发现的异常密度影，多数结节是良性的，但需要医生根据结节的大小、形态、密度等因素进行综合判断。',
        '准备': 'CT检查前需要：1) 去除金属物品；2) 按要求禁食或饮水；3) 如有对比剂过敏史请提前告知。',
        '复查': '复查时请携带之前的检查报告，按照医生建议的时间间隔进行。如果有任何不适，请及时就医。'
    };

    chatForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const message = chatInput.value.trim();
        if (!message) return;

        chatMessages.innerHTML += `
            <div class="flex justify-end" style="margin-bottom: 16px;">
                <div style="max-width: 85%; padding: 12px 16px; background-color: var(--primary); border-radius: 12px; border-bottom-right-radius: 4px;">
                    <p class="text-responsive-base" style="color: var(--text-primary);">${message}</p>
                </div>
            </div>
        `;

        let response = '感谢您的提问。根据您的问题，我建议您直接咨询您的主治医生以获得最准确的解答。您也可以通过"联系医生"功能向医生发送消息。';

        const lowerMsg = message.toLowerCase();
        for (const [key, value] of Object.entries(predefinedResponses)) {
            if (lowerMsg.includes(key)) {
                response = value;
                break;
            }
        }

        setTimeout(() => {
            chatMessages.innerHTML += `
                <div class="flex justify-start" style="margin-bottom: 16px;">
                    <div style="max-width: 85%; padding: 12px 16px; background-color: var(--bg-surface); border-radius: 12px; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                        <p class="text-responsive-base" style="color: var(--text-primary); line-height: 1.5;">${response}</p>
                        <p class="text-responsive-xs" style="color: var(--text-secondary); margin-top: 8px;">AI助手仅供参考</p>
                    </div>
                </div>
            `;
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }, 500);

        chatInput.value = '';
        chatMessages.scrollTop = chatMessages.scrollHeight;
    });
</script>
{% endblock %}
