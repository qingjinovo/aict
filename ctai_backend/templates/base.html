<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}选择角色 - SAM-Med3D{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-messages">
        {% for category, message in messages %}
        <div class="flash-message {{ category }}" id="flash-{{ loop.index }}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    {% block body %}{% endblock %}

    <div id="logout-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <div style="width: 60px; height: 60px; border-radius: 50%; background-color: var(--error-light); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <i data-lucide="log-out" class="w-7 h-7" style="color: var(--error);"></i>
            </div>
            <h3 style="font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px;">确认退出</h3>
            <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 24px;">确定要退出当前账号吗？</p>
            <div style="display: flex; gap: 12px;">
                <button onclick="closeLogoutModal()" class="btn btn-secondary flex-1">取消</button>
                <button onclick="confirmLogout()" class="btn btn-danger flex-1">确认退出</button>
            </div>
        </div>
    </div>

    <script>
        setTimeout(() => {
            document.querySelectorAll('.flash-message').forEach(el => {
                el.style.animation = 'fadeOut 0.3s ease-out forwards';
                setTimeout(() => el.remove(), 300);
            });
        }, 3000);

        function showLogoutModal() {
            document.getElementById('logout-modal').style.display = 'flex';
        }

        function closeLogoutModal() {
            document.getElementById('logout-modal').style.display = 'none';
        }

        function confirmLogout() {
            localStorage.removeItem('ctai_auth_token');
            localStorage.removeItem('ctai_user');
            window.location.href = '/logout';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeLogoutModal();
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
        });

        window.addEventListener('auth:expired', function() {
            if (window.authManager) {
                window.authManager.clear();
            }
            alert('登录已过期，请重新登录');
            window.location.href = '/login';
        });
    </script>
    {% block scripts %}
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    {% endblock %}
</body>
</html>
