<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NiiVue Medical Image Viewer - Patient View</title>
    <script src="https://unpkg.com/@niivue/niivue@0.68.2/dist/niivue.umd.js"></script>
    <style>
      :root {
        --primary-text: #165DFF;
        --primary: #E8F3FF;
        --primary-deep: #BAE0FF;
        --bg-surface: #F8FAFE;
        --bg-tool-light: rgba(248, 250, 254, 0.95);
        --text-primary: #1A1A2E;
        --text-secondary: #86909C;
        --text-on-dark: rgba(255, 255, 255, 0.9);
        --text-on-dark-secondary: rgba(255, 255, 255, 0.6);
        --border: #E5E7EB;
        --border-dark: rgba(255, 255, 255, 0.15);
        --radius-md: 6px;
        --radius-lg: 8px;
        --radius-xl: 12px;
        --transition-fast: 150ms ease;
        --shadow-ambient-elevated: 0 4px 16px rgba(0, 0, 0, 0.12);
        --font-size-xs: 12px;
        --font-size-sm: 13px;
        --font-size-base: 14px;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        font-size: var(--font-size-base);
      }

      #container {
        width: 100%;
        height: 100%;
        background: #0A0A14;
        position: relative;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .toolbar {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 100;
        background: var(--bg-tool-light);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 10px;
        border-radius: var(--radius-xl);
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 140px;
        box-shadow: var(--shadow-ambient-elevated);
        border: 1px solid rgba(229, 231, 235, 0.3);
      }

      .toolbar-row {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
      }

      .toolbar button {
        background: var(--bg-surface);
        color: var(--text-primary);
        border: 1px solid rgba(229, 231, 235, 0.3);
        padding: 8px 12px;
        border-radius: var(--radius-md);
        cursor: pointer;
        font-size: var(--font-size-sm);
        font-weight: 500;
        min-width: 50px;
        transition: background var(--transition-fast), border-color var(--transition-fast);
      }

      .toolbar button:hover {
        background: var(--primary);
        border-color: rgba(22, 93, 255, 0.3);
      }

      .toolbar button.active {
        background: var(--primary);
        border-color: var(--primary-text);
        color: var(--primary-text);
        font-weight: 600;
      }

      .info {
        position: absolute;
        bottom: 12px;
        left: 12px;
        z-index: 100;
        background: rgba(10, 10, 20, 0.8);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        color: var(--text-on-dark-secondary);
        padding: 8px 12px;
        border-radius: var(--radius-lg);
        font-size: var(--font-size-xs);
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <canvas id="nv-canvas"></canvas>
    </div>
    <div class="toolbar">
      <div class="toolbar-row">
        <button onclick="setSliceType('axial')" id="btn-axial">横断面</button>
        <button onclick="setSliceType('coronal')" id="btn-coronal">冠状面</button>
        <button onclick="setSliceType('sagittal')" id="btn-sagittal">矢状面</button>
      </div>
      <div class="toolbar-row">
        <button onclick="setSliceType('multi')" id="btn-multi">多平面</button>
        <button onclick="setSliceType('3d')" id="btn-3d">3D视图</button>
      </div>
    </div>
    <div class="info" id="info">等待加载...</div>

    <script>
      let nv = null;

      const urlParams = new URLSearchParams(window.location.search);
      const fileUrl = urlParams.get('file');
      const ctImageId = urlParams.get('ctImageId');

      async function init() {
        const canvas = document.getElementById('nv-canvas');

        nv = new niivue.Niivue({
          loadingText: '加载医学影像...',
          backColor: [0, 0, 0, 1],
          crosshairColor: [0, 1, 1, 1],
          show3Dcrosshair: true
        });

        nv.attachTo('nv-canvas');

        let volumes = [];
        if (fileUrl) {
          volumes = [{ url: fileUrl }];
        } else {
          volumes = [{ url: './hippo.nii' }];
        }

        try {
          await nv.loadVolumes(volumes);
          document.getElementById('info').textContent = '影像已加载: ' + (nv.volumes[0]?.name || 'unknown');
          notifyParent('niivue-ready', { success: true });
        } catch (err) {
          console.error('Failed to load volume:', err);
          document.getElementById('info').textContent = '加载失败: ' + err.message;
          notifyParent('niivue-error', { error: err.message });
        }

        nv.opts.onLocationChange = handleLocationChange;
        nv.opts.onImageLoaded = handleImageLoaded;
      }

      function handleLocationChange(data) {
        if (data && data.values) {
          document.getElementById('info').textContent =
            '位置: ' + JSON.stringify(data.values);
          notifyParent('niivue-location', { values: data.values });
        }
      }

      function handleImageLoaded() {
        notifyParent('niivue-image-loaded', {
          volumeCount: nv.volumes.length
        });
      }

      function setSliceType(type) {
        if (!nv) return;
        const sliceTypes = {
          'axial': nv.sliceTypeAxial,
          'coronal': nv.sliceTypeCoronal,
          'sagittal': nv.sliceTypeSagittal,
          'multi': nv.sliceTypeMultiplanar,
          '3d': nv.sliceTypeRender
        };
        nv.setSliceType(sliceTypes[type]);
        document.querySelectorAll('.toolbar button').forEach(function(b) { b.classList.remove('active'); });
        document.getElementById('btn-' + type)?.classList.add('active');
      }

      function notifyParent(eventName, data) {
        window.parent.postMessage({ type: eventName, detail: data }, '*');
      }

      window.getNiivueInstance = () => nv;
      window.setSliceType = setSliceType;

      init().catch(err => {
        console.error('Init error:', err);
        document.getElementById('info').textContent = '初始化失败: ' + err.message;
      });
    </script>
  </body>
</html>
