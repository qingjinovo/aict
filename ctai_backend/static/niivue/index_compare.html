<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NiiVue Medical Image Comparison View</title>
    <script src="https://unpkg.com/pako@2.1.0/dist/pako.min.js"></script>
    <script src="https://unpkg.com/@niivue/niivue@0.68.2/dist/niivue.umd.js"></script>
    <style>
      :root {
        --primary-text: #165DFF;
        --primary: #E8F3FF;
        --primary-deep: #BAE0FF;
        --bg-surface: #F8FAFE;
        --bg-tool: rgba(10, 10, 20, 0.85);
        --bg-tool-light: rgba(248, 250, 254, 0.95);
        --text-primary: #1A1A2E;
        --text-secondary: #86909C;
        --text-on-dark: rgba(255, 255, 255, 0.9);
        --text-on-dark-secondary: rgba(255, 255, 255, 0.6);
        --border: #E5E7EB;
        --border-dark: rgba(255, 255, 255, 0.15);
        --radius-md: 6px;
        --radius-lg: 8px;
        --radius-xl: 12px;
        --transition-fast: 150ms ease;
        --shadow-ambient-elevated: 0 4px 16px rgba(0, 0, 0, 0.12);
        --font-size-xs: 12px;
        --font-size-sm: 13px;
        --font-size-base: 14px;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        font-size: var(--font-size-base);
      }

      #container {
        width: 100%;
        height: 100%;
        background: #0A0A14;
        position: relative;
        display: flex;
        flex-direction: column;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .top-controls {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 100;
        display: flex;
        flex-direction: row;
        gap: 8px;
      }

      .dropdown {
        position: relative;
      }

      .dropdown-btn {
        background: var(--bg-tool-light);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        color: var(--text-primary);
        border: 1px solid rgba(229, 231, 235, 0.3);
        padding: 8px 14px;
        border-radius: var(--radius-lg);
        cursor: pointer;
        font-size: var(--font-size-sm);
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 110px;
        justify-content: space-between;
        box-shadow: var(--shadow-ambient-elevated);
        transition: background var(--transition-fast), border-color var(--transition-fast);
      }

      .dropdown-btn:hover {
        background: rgba(232, 243, 255, 0.95);
        border-color: rgba(22, 93, 255, 0.3);
      }

      .dropdown-btn.active {
        background: var(--primary);
        border-color: var(--primary-text);
        color: var(--primary-text);
      }

      .dropdown-btn::after {
        content: '▼';
        font-size: 10px;
        transition: transform var(--transition-fast);
      }

      .dropdown.open .dropdown-btn::after {
        transform: rotate(180deg);
      }

      .dropdown-content {
        display: none;
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        background: var(--bg-tool-light);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: var(--radius-xl);
        padding: 8px;
        min-width: 120px;
        box-shadow: var(--shadow-ambient-elevated);
        border: 1px solid rgba(229, 231, 235, 0.3);
      }

      .dropdown.open .dropdown-content { display: block; }

      .dropdown-item {
        color: var(--text-primary);
        padding: 8px 12px;
        border-radius: var(--radius-md);
        cursor: pointer;
        font-size: var(--font-size-sm);
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 120px;
        transition: background var(--transition-fast);
      }

      .dropdown-item:hover { background: var(--primary); }

      .dropdown-item.active {
        background: var(--primary);
        color: var(--primary-text);
        font-weight: 500;
      }

      .dropdown-item-check {
        width: 16px;
        height: 16px;
        opacity: 0;
        text-align: center;
      }

      .dropdown-item.active .dropdown-item-check { opacity: 1; }

      .info {
        position: absolute;
        bottom: 12px;
        left: 12px;
        z-index: 100;
        background: rgba(10, 10, 20, 0.8);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        color: var(--text-on-dark-secondary);
        padding: 8px 12px;
        border-radius: var(--radius-lg);
        font-size: var(--font-size-xs);
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <canvas id="nv-canvas"></canvas>
    </div>
    <div class="top-controls">
      <div class="dropdown" id="dropdown-original">
        <button class="dropdown-btn" onclick="toggleDropdown('original')">
          <span>原图: <span id="label-original">50%</span></span>
          <span style="font-size: 10px;">▼</span>
        </button>
        <div class="dropdown-content">
          <div class="dropdown-item" data-value="0" onclick="setOriginalOpacity(0)">
            <span class="dropdown-item-check">✓</span> 0%
          </div>
          <div class="dropdown-item" data-value="10" onclick="setOriginalOpacity(10)">
            <span class="dropdown-item-check">✓</span> 10%
          </div>
          <div class="dropdown-item" data-value="20" onclick="setOriginalOpacity(20)">
            <span class="dropdown-item-check">✓</span> 20%
          </div>
          <div class="dropdown-item" data-value="30" onclick="setOriginalOpacity(30)">
            <span class="dropdown-item-check">✓</span> 30%
          </div>
          <div class="dropdown-item" data-value="40" onclick="setOriginalOpacity(40)">
            <span class="dropdown-item-check">✓</span> 40%
          </div>
          <div class="dropdown-item active" data-value="50" onclick="setOriginalOpacity(50)">
            <span class="dropdown-item-check">✓</span> 50%
          </div>
          <div class="dropdown-item" data-value="60" onclick="setOriginalOpacity(60)">
            <span class="dropdown-item-check">✓</span> 60%
          </div>
          <div class="dropdown-item" data-value="70" onclick="setOriginalOpacity(70)">
            <span class="dropdown-item-check">✓</span> 70%
          </div>
          <div class="dropdown-item" data-value="80" onclick="setOriginalOpacity(80)">
            <span class="dropdown-item-check">✓</span> 80%
          </div>
          <div class="dropdown-item" data-value="90" onclick="setOriginalOpacity(90)">
            <span class="dropdown-item-check">✓</span> 90%
          </div>
          <div class="dropdown-item" data-value="100" onclick="setOriginalOpacity(100)">
            <span class="dropdown-item-check">✓</span> 100%
          </div>
        </div>
      </div>

      <div class="dropdown" id="dropdown-ai">
        <button class="dropdown-btn" onclick="toggleDropdown('ai')">
          <span>AI: <span id="label-ai">80%</span></span>
          <span style="font-size: 10px;">▼</span>
        </button>
        <div class="dropdown-content">
          <div class="dropdown-item" data-value="0" onclick="setAiOpacity(0)">
            <span class="dropdown-item-check">✓</span> 0%
          </div>
          <div class="dropdown-item" data-value="10" onclick="setAiOpacity(10)">
            <span class="dropdown-item-check">✓</span> 10%
          </div>
          <div class="dropdown-item" data-value="20" onclick="setAiOpacity(20)">
            <span class="dropdown-item-check">✓</span> 20%
          </div>
          <div class="dropdown-item" data-value="30" onclick="setAiOpacity(30)">
            <span class="dropdown-item-check">✓</span> 30%
          </div>
          <div class="dropdown-item" data-value="40" onclick="setAiOpacity(40)">
            <span class="dropdown-item-check">✓</span> 40%
          </div>
          <div class="dropdown-item" data-value="50" onclick="setAiOpacity(50)">
            <span class="dropdown-item-check">✓</span> 50%
          </div>
          <div class="dropdown-item" data-value="60" onclick="setAiOpacity(60)">
            <span class="dropdown-item-check">✓</span> 60%
          </div>
          <div class="dropdown-item" data-value="70" onclick="setAiOpacity(70)">
            <span class="dropdown-item-check">✓</span> 70%
          </div>
          <div class="dropdown-item active" data-value="80" onclick="setAiOpacity(80)">
            <span class="dropdown-item-check">✓</span> 80%
          </div>
          <div class="dropdown-item" data-value="90" onclick="setAiOpacity(90)">
            <span class="dropdown-item-check">✓</span> 90%
          </div>
          <div class="dropdown-item" data-value="100" onclick="setAiOpacity(100)">
            <span class="dropdown-item-check">✓</span> 100%
          </div>
        </div>
      </div>

      <div class="dropdown" id="dropdown-view">
        <button class="dropdown-btn active" onclick="toggleDropdown('view')">
          <span>视图: <span id="label-view">横断面</span></span>
          <span style="font-size: 10px;">▼</span>
        </button>
        <div class="dropdown-content">
          <div class="dropdown-item active" data-value="axial" onclick="setSliceType('axial')">
            <span class="dropdown-item-check">✓</span> 横断面
          </div>
          <div class="dropdown-item" data-value="coronal" onclick="setSliceType('coronal')">
            <span class="dropdown-item-check">✓</span> 冠状面
          </div>
          <div class="dropdown-item" data-value="sagittal" onclick="setSliceType('sagittal')">
            <span class="dropdown-item-check">✓</span> 矢状面
          </div>
          <div class="dropdown-item" data-value="multi" onclick="setSliceType('multi')">
            <span class="dropdown-item-check">✓</span> 多平面
          </div>
          <div class="dropdown-item" data-value="3d" onclick="setSliceType('3d')">
            <span class="dropdown-item-check">✓</span> 3D视图
          </div>
        </div>
      </div>
    </div>
    <div class="info" id="info">等待加载...</div>

    <script>
      let nv = null;
      let originalVolumeIndex = -1;
      let aiVolumeIndex = -1;
      let originalOpacity = 0.5;
      let aiOpacity = 0.8;
      let currentSliceType = 'axial';

      const urlParams = new URLSearchParams(window.location.search);
      const originalUrl = urlParams.get('original') || '';
      const aiUrl = urlParams.get('ai') || '';
      const ctImageId = urlParams.get('ctImageId') || '';

      const sliceTypeLabels = {
        'axial': '横断面',
        'coronal': '冠状面',
        'sagittal': '矢状面',
        'multi': '多平面',
        '3d': '3D视图'
      };

      const customColormaps = {
        'custom-orange': { R: [255, 87, 34], G: [0, 0, 0], B: [0, 0, 0], A: [0, 128, 255], I: [0, 127, 255] },
        'custom-pink': { R: [233, 30, 99], G: [0, 0, 0], B: [0, 0, 0], A: [0, 128, 255], I: [0, 127, 255] },
        'custom-purple': { R: [156, 39, 176], G: [0, 0, 0], B: [0, 0, 0], A: [0, 128, 255], I: [0, 127, 255] },
        'custom-blue': { R: [33, 150, 243], G: [0, 0, 0], B: [0, 0, 0], A: [0, 128, 255], I: [0, 127, 255] },
        'custom-cyan': { R: [0, 188, 212], G: [0, 0, 0], B: [0, 0, 0], A: [0, 128, 255], I: [0, 127, 255] },
        'custom-green': { R: [76, 175, 80], G: [0, 0, 0], B: [0, 0, 0], A: [0, 128, 255], I: [0, 127, 255] },
        'custom-yellow': { R: [255, 235, 59], G: [0, 0, 0], B: [0, 0, 0], A: [0, 128, 255], I: [0, 127, 255] },
        'custom-orange2': { R: [255, 152, 0], G: [0, 0, 0], B: [0, 0, 0], A: [0, 128, 255], I: [0, 127, 255] }
      };

      function toggleDropdown(name) {
        const allDropdowns = document.querySelectorAll('.dropdown');
        allDropdowns.forEach(d => {
          if (d.id !== 'dropdown-' + name) {
            d.classList.remove('open');
          }
        });
        const dropdown = document.getElementById('dropdown-' + name);
        dropdown.classList.toggle('open');
      }

      document.addEventListener('click', function(e) {
        if (!e.target.closest('.dropdown')) {
          document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
        }
      });

      function setOriginalOpacity(val) {
        originalOpacity = val / 100;
        document.getElementById('label-original').textContent = val + '%';
        updateDropdownSelection('dropdown-original', val);
        document.getElementById('dropdown-original').classList.remove('open');
        const nvInstance = window.nv;
        if (!nvInstance || originalVolumeIndex < 0) return;
        nvInstance.volumes[originalVolumeIndex].opacity = originalOpacity;
        nvInstance.updateGLVolume();
      }

      function setAiOpacity(val) {
        aiOpacity = val / 100;
        document.getElementById('label-ai').textContent = val + '%';
        updateDropdownSelection('dropdown-ai', val);
        document.getElementById('dropdown-ai').classList.remove('open');
        const nvInstance = window.nv;
        if (!nvInstance || aiVolumeIndex < 0) return;
        nvInstance.volumes[aiVolumeIndex].opacity = aiOpacity;
        nvInstance.updateGLVolume();
      }

      function setSliceType(type) {
        currentSliceType = type;
        document.getElementById('label-view').textContent = sliceTypeLabels[type] || type;
        updateDropdownSelection('dropdown-view', type);
        document.getElementById('dropdown-view').classList.remove('open');
        const nvInstance = window.nv;
        if (!nvInstance) return;
        const sliceTypes = {
          'axial': nvInstance.sliceTypeAxial,
          'coronal': nvInstance.sliceTypeCoronal,
          'sagittal': nvInstance.sliceTypeSagittal,
          'multi': nvInstance.sliceTypeMultiplanar,
          '3d': nvInstance.sliceTypeRender
        };
        nvInstance.setSliceType(sliceTypes[type]);
      }

      function updateDropdownSelection(dropdownId, value) {
        const dropdown = document.getElementById(dropdownId);
        dropdown.querySelectorAll('.dropdown-item').forEach(item => {
          item.classList.toggle('active', item.dataset.value === String(value));
        });
        const btn = dropdown.querySelector('.dropdown-btn');
        if (dropdownId === 'dropdown-original') {
          btn.classList.toggle('active', value !== 100);
        } else if (dropdownId === 'dropdown-ai') {
          btn.classList.toggle('active', value !== 80);
        }
      }

      async function init() {
        const canvas = document.getElementById('nv-canvas');

        nv = new niivue.Niivue({
          loadingText: '加载医学影像...',
          backColor: [0, 0, 0, 1],
          crosshairColor: [0, 1, 1, 1],
          show3Dcrosshair: true
        });

        nv.attachTo('nv-canvas');

        for (const [name, cmap] of Object.entries(customColormaps)) {
          nv.addColormap(name, cmap);
        }

        const volumes = [];
        if (originalUrl) {
          volumes.push({ url: originalUrl });
        }
        if (aiUrl) {
          volumes.push({ url: aiUrl });
        }

        if (volumes.length === 0) {
          volumes.push({ url: './hippo.nii' });
        }

        console.log('Loading volumes:', volumes);

        try {
          if (volumes.length > 1) {
            await nv.loadVolumes([volumes[0], volumes[1]]);
          } else {
            await nv.loadVolumes([volumes[0]]);
          }
          document.getElementById('info').textContent = '已加载 ' + nv.volumes.length + ' 个文件';

          if (nv.volumes.length >= 2) {
            originalVolumeIndex = 0;
            aiVolumeIndex = 1;
            nv.volumes[originalVolumeIndex].opacity = originalOpacity;
            nv.volumes[aiVolumeIndex].opacity = aiOpacity;
            nv.setColormap(nv.volumes[aiVolumeIndex].id, 'custom-orange');
            nv.updateGLVolume();
          } else if (nv.volumes.length === 1) {
            originalVolumeIndex = 0;
            aiVolumeIndex = -1;
            nv.volumes[originalVolumeIndex].opacity = 1;
          }

          window.nv = nv;
          notifyParent('niivue-ready', { success: true, volumeCount: nv.volumes.length });
        } catch (err) {
          console.error('Failed to load volumes:', err);
          document.getElementById('info').textContent = '加载失败: ' + err.message;
          notifyParent('niivue-error', { error: err.message });
        }

        nv.opts.onLocationChange = handleLocationChange;
      }

      function handleLocationChange(data) {
        if (data && data.values) {
          notifyParent('niivue-location', { values: data.values });
        }
      }

      function notifyParent(eventName, data) {
        window.parent.postMessage({ type: eventName, detail: data }, '*');
      }

      window.getNiivueInstance = () => nv;
      window.setSliceType = setSliceType;

      init().catch(err => {
        console.error('Init error:', err);
        document.getElementById('info').textContent = '初始化失败: ' + err.message;
      });
    </script>
  </body>
</html>
