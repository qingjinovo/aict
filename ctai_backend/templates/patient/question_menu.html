{% extends "base.html" %}

{% block title %}咨询问题 - SAM-Med3D{% endblock %}

{% block body %}
<div class="min-h-screen" style="background-color: var(--bg-main);">
    <div class="page-header">
        <div class="container">
            <div class="flex items-center justify-between">
                <div class="min-w-0" style="flex: 1;">
                    <h1 class="text-responsive-lg" style="font-weight: 600; color: var(--text-primary); line-height: 1.3;">咨询问题</h1>
                    <p class="text-responsive-sm" style="color: var(--text-secondary); margin-top: 4px;">选择您想咨询的问题类型</p>
                </div>
                <button onclick="window.location.href='{{ url_for('patient.dashboard') }}'" class="btn btn-secondary flex-shrink-0" style="padding: 8px 12px;">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    <span class="hidden md:inline">返回</span>
                </button>
            </div>
        </div>
    </div>

    <div class="page-content">
        <div class="container">
            <div class="grid gap-4" style="grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr)); max-width: 900px; margin: 0 auto;">
                <div class="card cursor-pointer" onclick="window.location.href='{{ url_for('patient.ai_chat') }}'">
                    <div class="text-center" style="padding: clamp(16px, 4vw, 24px);">
                        <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4" style="background-color: var(--primary);">
                            <i data-lucide="bot" class="w-8 h-8" style="color: var(--primary-text);"></i>
                        </div>
                        <h3 class="text-responsive-base mb-2" style="font-weight: 600; color: var(--text-primary);">AI智能咨询</h3>
                        <p class="text-responsive-sm" style="color: var(--text-secondary); line-height: 1.5;">快速解答常见问题，获取诊疗建议</p>
                    </div>
                </div>

                <div class="card cursor-pointer" onclick="window.location.href='{{ url_for('patient.message', report_id=reports[0].id if reports else 0) }}'">
                    <div class="text-center" style="padding: clamp(16px, 4vw, 24px);">
                        <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4" style="background-color: var(--success-light);">
                            <i data-lucide="message-circle" class="w-8 h-8" style="color: var(--success);"></i>
                        </div>
                        <h3 class="text-responsive-base mb-2" style="font-weight: 600; color: var(--text-primary);">联系医生</h3>
                        <p class="text-responsive-sm" style="color: var(--text-secondary); line-height: 1.5;">向主治医生发送消息，获取专业解答</p>
                    </div>
                </div>

                <div class="card cursor-pointer" onclick="window.location.href='{{ url_for('patient.contact_doctor') }}'">
                    <div class="text-center" style="padding: clamp(16px, 4vw, 24px);">
                        <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4" style="background-color: var(--warning-light);">
                            <i data-lucide="phone" class="w-8 h-8" style="color: var(--warning);"></i>
                        </div>
                        <h3 class="text-responsive-base mb-2" style="font-weight: 600; color: var(--text-primary);">电话咨询</h3>
                        <p class="text-responsive-sm" style="color: var(--text-secondary); line-height: 1.5;">获取医院联系电话，直接与医护人员沟通</p>
                    </div>
                </div>

                <div class="card cursor-pointer" onclick="window.location.href='{{ url_for('patient.feedback', report_id=reports[0].id if reports else 0) }}'">
                    <div class="text-center" style="padding: clamp(16px, 4vw, 24px);">
                        <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4" style="background-color: var(--error-light);">
                            <i data-lucide="star" class="w-8 h-8" style="color: var(--error);"></i>
                        </div>
                        <h3 class="text-responsive-base mb-2" style="font-weight: 600; color: var(--text-primary);">满意度反馈</h3>
                        <p class="text-responsive-sm" style="color: var(--text-secondary); line-height: 1.5;">对本次服务进行评价，帮助我们改进</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
