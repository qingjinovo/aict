{% extends "base.html" %}

{% block title %}选择角色 - SAM-Med3D{% endblock %}

{% block body %}
<div class="min-h-screen" style="background-color: var(--bg-main);">
    <div style="max-width: 800px; margin: 0 auto; padding: var(--spacing-xxl) var(--spacing-lg);">
        <div class="text-center" style="margin-bottom: var(--spacing-xxl);">
            <h1 class="mb-2" style="font-size: clamp(20px, 5vw, 24px); font-weight: 600; color: var(--text-primary); letter-spacing: -0.025em;">
                SAM-Med3D 医学影像诊断平台
            </h1>
            <p style="font-size: var(--font-size-base); color: var(--text-secondary); max-width: 480px; margin: 0 auto; line-height: 1.6;">
                集成 AI 分割模型的 CT 影像辅助诊断系统，为医生提供精准标注工具，为患者提供便捷影像服务。
            </p>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: var(--spacing-xl);">
            <a href="{{ url_for('auth.login') }}?role=doctor" class="card p-0 w-full" style="cursor: pointer; border: 1px solid var(--border); text-align: left; padding: var(--spacing-lg); background-color: var(--bg-surface); transition: transform var(--transition-normal), box-shadow var(--transition-normal); text-decoration: none;">
                <div style="width: 56px; height: 56px; background-color: var(--primary); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; margin-bottom: var(--spacing-md);">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary-text);">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <line x1="19" y1="8" x2="19" y2="14"/>
                        <line x1="22" y1="11" x2="16" y2="11"/>
                    </svg>
                </div>
                <h2 class="text-xl mb-2" style="font-weight: 600; color: var(--text-primary);">医生工作台</h2>
                <p class="text-sm mb-3" style="color: var(--text-secondary); line-height: 1.5;">
                    影像阅片、报告审批、标注工具、患者管理
                </p>
                <span style="display: inline-flex; align-items: center; color: var(--primary-text); font-size: var(--font-size-base); font-weight: 500;">
                    进入工作台 <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ml-2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </span>
            </a>

            <a href="{{ url_for('auth.login') }}?role=patient" class="card p-0 w-full" style="cursor: pointer; border: 1px solid var(--border); text-align: left; padding: var(--spacing-lg); background-color: var(--bg-surface); transition: transform var(--transition-normal), box-shadow var(--transition-normal); text-decoration: none;">
                <div style="width: 56px; height: 56px; background-color: var(--primary); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; margin-bottom: var(--spacing-md);">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary-text);">
                        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                    </svg>
                </div>
                <h2 class="text-xl mb-2" style="font-weight: 600; color: var(--text-primary);">患者服务</h2>
                <p class="text-sm mb-3" style="color: var(--text-secondary); line-height: 1.5;">
                    上传影像、查看报告、AI 分析、历史记录
                </p>
                <span style="display: inline-flex; align-items: center; color: var(--primary-text); font-size: var(--font-size-base); font-weight: 500;">
                    进入服务 <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ml-2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </span>
            </a>
        </div>
    </div>
</div>
{% endblock %}
